# JUnit 5 Platform Configuration for Performance Optimization
# Enable parallel execution
junit.jupiter.execution.parallel.enabled=false
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=same_thread
# Dynamic parallel configuration
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=1.0
# Custom parallel configuration (alternative to dynamic)
# junit.jupiter.execution.parallel.config.strategy=custom
# junit.jupiter.execution.parallel.config.custom.class=com.thy.fss.common.inmemory.common.CustomParallelStrategy
# Test instance lifecycle
junit.jupiter.testinstance.lifecycle.default=per_method
# Display name generation
junit.jupiter.displayname.generator.default=org.junit.jupiter.api.DisplayNameGenerator$ReplaceUnderscores
# Test method ordering
junit.jupiter.testmethod.order.default=org.junit.jupiter.api.MethodOrderer$OrderAnnotation
# Extensions auto-detection
junit.jupiter.extensions.autodetection.enabled=true
# Timeout configuration
junit.jupiter.execution.timeout.default=30s
junit.jupiter.execution.timeout.testable.method.default=30s
junit.jupiter.execution.timeout.test.method.default=30s
# Condition evaluation
junit.jupiter.conditions.deactivate=
# Test discovery
junit.jupiter.testclass.order.default=org.junit.jupiter.api.ClassOrderer$OrderAnnotation
# Performance monitoring
junit.jupiter.execution.parallel.config.dynamic.max-pool-size-factor=2.0
junit.jupiter.execution.parallel.config.dynamic.core-pool-size-factor=1.0
junit.jupiter.execution.parallel.config.dynamic.keep-alive=30s
junit.jupiter.execution.parallel.config.dynamic.saturate=true