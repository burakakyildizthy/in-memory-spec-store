########################################################################################################################
### document-version parametresi bu dokümanın versiyonunu temsil etmektedir.                                         ###
### Değiştirilmemelidir.                                                                                             ###
########################################################################################################################
document-version: 2.4

########################################################################################################################
### will-be-deployed parametresi projenin build sonrasında test ortama deploy edilip edilmeyeceğini belirlemektedir. ###
### Test ortamlara deploy etmek istenildiğinde true olarak set edilmelidir. Default değeri false set edilmiştir.     ###
########################################################################################################################
will-be-deployed: false

  ########################################################################################################################
  ### server-type parametresi projenin deploy edileceği uygulama sunucusu tipini temsil etmektedir.                    ###
  ### Test ortamlara deploy etmek istenildiğinde set edilmesi zorunludur.                                              ###
  ### Alabileceği değerler: weblogic, iis, awseb, tkstore, apache, esb, openshift, azure,  winservice                  ###
  ### bkz. 'will-be-deployed' parametresi                                                                              ###
  ########################################################################################################################
  #server-type: openshift

  ########################################################################################################################
  ###    Bu blok tüm platformlar için deploy ve/veya test otomasyon süreçleri için ortak alandır.                   ###
  ### Weblogic, IIS, TKStore, AWS Elasticbeanstalk, ortamlarına deployment ve/veya test koşumu yapılacağı              ###
  ### zaman doldurulmalıdır.                                                                    ###
  ### deploy-test-sequence bloğu yukardan aşağıya doğru belirtilen sırayla deploy ve/veya test süreçlerini          ###
  ### belirtilen konfigürasyonlar ile çalıştırmaktadır.                                                ###
  ### dev-deploy-test-sequence bloğu develop branch üzerinden oluşan paketin hangi ortamlara atılacağı ve sonrasında   ###
  ### eğer varsa test otomasyon bilgisini içermektedir. (develop pipeline)                                            ###
  ### release-deploy-test-sequence bloğu release branch üzerinden oluşan paketin hangi ortamlara atılacağı             ###
  ###    ve sonrasında eğer varsa test otomasyon bilgisini içermektedir. (release pipeline)                         ###
  ### 'wait-result' parametresi test otomasyon job'unun sonucunun beklenmesini ifade eder.                      ###
  ### Weblogic için; ortamların detaylarının girileceği kısım weblogic-config alanıdır.                        ###
  ### ISS için; ortamların detaylarının girileceği kısım iis-config alanıdır.                                   ###
  ### AWSEB için; ortamların detaylarının girileceği kısım awseb-config alanıdır.                                ###
  ### TKStore için; ortamların detaylarının girileceği kısım tkstore-config alanıdır.                             ###
  ### Openshift için; ortamların detaylarının girileceği kısım openshift-config alanıdır.                           ###
  ###    Birden fazla deploy ve/veya test ortam bilgisi ayrı ayrı parametrelere set edilebilir.                    ###
  ### 'deploy' ve 'test' key'leri sabittir ve değiştirilmemelidir.                                        ###
  ### 'continue-on-fail' opsiyonel bir parametredir. 'deploy' ve/veya 'test' adımları içerisinde 'true' olarak set     ###
  ### edildiğinde sonuç 'FAILURE' olması durumunda süreci sollandırır. Bir sonraki parametreye geçmez.             ###
  ########################################################################################################################
  #dev-deploy-test-sequence:
  #  - deploy: cure-dev
  #  - test: #smoke-test-job
  #    wait-result: true
  #  - deploy: #weblogic-kurumsaldev01
  #  - test: #regression-test-job
  #    wait-result: false

#release-deploy-test-sequence:
# - deploy: cure-test
# - deploy: cure-uat
#   continue-on-fail: false
#  - test: #regression-test-job
#    wait-result: false
#    continue-on-fail: true

########################################################################################################################
### Sadece Android ve iOS projeler için set edilmesi zorunludur.                                                     ###
### app-name parametresi build sırasında artifactlerin isimlendirilmesi için kullanılmaktadır.                     ###
### Örn. smartmobile, upmobile, vs.                                                                                  ###
########################################################################################################################
app-name: in-memory-spec-store
targets: all

########################################################################################################################
### Bu blok sadece Android uygulamalar için doldurulmalıdır.                                                           ###
### Android uygulamalarının hangi targetlar üzerinden paket oluşturalacağı bilgisini temsil etmektedir.              ###
### Android build alınması için android-properties mutlaka doldurulmalıdır.                                          ###
########################################################################################################################
gradle-properties:
  - target: dev
    target-name: bootJar
    unit-test: true
  - target: dev
    target-name: publish
  - target: preprod
    target-name: publish
#  - target: #pilot
#    target-name: #assemblePilotRelease
  - target: prod
    target-name: publish

